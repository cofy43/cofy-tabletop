name: CI — Backend & Core Types

on:
  push:
    branches: [main]
    paths:
      - 'apps/backend/**'
      - 'packages/core-types/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/backend/**'
      - 'packages/core-types/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/ci.yml'

jobs:
  ci:
    name: Lint, Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      matrix:
        node-version: [22]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build core-types
        run: pnpm --filter @cofy-tabletop/core-types build

      - name: Lint backend
        run: pnpm --filter backend lint

      - name: Build backend
        run: pnpm --filter backend build

      - name: Test backend
        run: pnpm --filter backend test

  security:
    name: Security & Vulnerability Scanning
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Necesario para buscar secretos en todo el historial del PR/Push

      # Búsqueda de secretos usando TruffleHog
      - name: Secret Scanning (TruffleHog)
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      # Análisis de vulnerabilidades en dependencias
      - name: Dependency Audit (pnpm audit)
        run: |
          pnpm install --frozen-lockfile
          pnpm audit --audit-level high

  codeql:
    name: CodeQL SAST Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript, typescript

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript,typescript"
